<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Barber - Barber & Hair Cutting</title>

    <meta name="title" content="Barber - Barber & Hair Cutting" />
    <meta
      name="description"
      content="This is a Barber shop located in Cape Town"
    />

    <!-- Favicon -->
    <link rel="shortcut icon" href="./favicon.svg" type="image/x-icon" />

    <!-- CSS -->
    <link rel="stylesheet" href="./assets/css/style.css" />
    <link rel="stylesheet" href="./assets/css/flaticon.min.css" />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Rubik:wght@300;400;700&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <!-- Header -->
    <header class="header">
      <div class="header-top">
        <div class="container">
          <ul class="header-top-list">
            <li class="header-top-item">
              <ion-icon name="call-outline" aria-hidden="true"></ion-icon>

              <p class="item-title">Call Us :</p>

              <a href="tel:01234567895" class="item-link">012 (345) 67 895</a>
            </li>

            <li class="header-top-item">
              <ion-icon name="time-outline" aria-hidden="true"></ion-icon>

              <p class="item-title">Opening Hour :</p>

              <p class="item-text">Sunday - Friday, 08 am - 09 pm</p>
            </li>

            <li>
              <ul class="social-list">
                <li>
                  <a href="#" class="social-link">
                    <ion-icon name="logo-facebook"></ion-icon>
                  </a>
                </li>

                <li>
                  <a href="#" class="social-link">
                    <ion-icon name="logo-twitter"></ion-icon>
                  </a>
                </li>

                <li>
                  <a href="#" class="social-link">
                    <ion-icon name="logo-youtube"></ion-icon>
                  </a>
                </li>

                <li>
                  <a href="#" class="social-link">
                    <ion-icon name="chatbubble-ellipses-outline"></ion-icon>
                  </a>
                </li>
              </ul>
            </li>
          </ul>
        </div>
      </div>

      <div class="header-bottom" data-header>
        <div class="container">
          <a href="#" class="logo">
            Barber
            <span class="span">Hair Salon</span>
          </a>

          <nav class="navbar container" data-navbar>
            <ul class="navbar-list">
              <li class="navbar-item">
                <a href="#home" class="navbar-link" data-nav-link>Home</a>
              </li>

              <li class="navbar-item">
                <a href="#services" class="navbar-link" data-nav-link
                  >Services</a
                >
              </li>

              <li class="navbar-item">
                <a href="#pricing" class="navbar-link" data-nav-link>Pricing</a>
              </li>

              <li class="navbar-item">
                <a href="#gallery" class="navbar-link" data-nav-link>Gallery</a>
              </li>

              <li class="navbar-item">
                <a href="#appointment" class="navbar-link" data-nav-link
                  >Appointment</a
                >
              </li>

              <li class="navbar-item">
                <a href="#" class="navbar-link" data-nav-link>Contact</a>
              </li>
            </ul>
          </nav>

          <button
            class="nav-toggle-btn"
            aria-label="toggle menu"
            data-nav-toggler
          >
            <ion-icon name="menu-outline" aria-hidden="true"></ion-icon>
          </button>

          <a href="#" class="btn has-before">
            <span class="span">Appointment</span>

            <ion-icon name="arrow-forward" aria-hidden="true"></ion-icon>
          </a>
        </div>
      </div>
    </header>

    <!-- JS -->
    <script src="./assets/js/script.js" defer></script>
    <script
      type="module"
      src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.esm.js"
    ></script>
    <script
      nomodule
      src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.js"
    ></script>
  </body>
</html>
